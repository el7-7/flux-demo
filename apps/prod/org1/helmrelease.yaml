apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wordpress
  namespace: org1-prod
spec:
  interval: 5m
  chart:
    spec:
      chart: oci://registry-1.docker.io/bitnamicharts/wordpress
      version: 30.0.3
      # enable OCI support
      enableOCI: true
  values:
    wordpressUsername: admin
    wordpressPassword: password123
    wordpressEmail: admin@example.com
    wordpressBlogName: "My Blog"

    service:
      type: ClusterIP

    ingress:
      enabled: true
      ingressClassName: nginx
      hostname: flux.test.com
      annotations:
        kubernetes.io/ingress.class: nginx
