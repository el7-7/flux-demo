apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wordpress
  namespace: org1-prod
spec:
  releaseName: wordpress
  interval: 5m
  chart:
    spec:
      chart: wordpress
      sourceRef:
        kind: HelmRepository
        name: bitnami-wordpress
        namespace: flux-system
      version: 19.4.1  # valid version from Bitnami repo
  values:
    wordpressUsername: admin
    wordpressPassword: password123
    wordpressEmail: admin@example.com
    wordpressBlogName: "My Blog"

    service:
      type: ClusterIP

    ingress:
      enabled: true
      ingressClassName: nginx
      hostname: flux.test.com
      annotations:
        kubernetes.io/ingress.class: nginx
