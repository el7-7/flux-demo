# infrastructure/controllers/ingress-nginx/helmrelease.yaml
apiVersion: helm.toolkit.fluxcd.io/v1
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: kube-system
spec:
  releaseName: ingress-nginx
  chart:
    spec:
      chart:
        spec:
          chart: ingress-nginx
          sourceRef:
            kind: HelmRepository
            name: ingress-nginx
            namespace: flux-system
          version: "5.7.0"
      install:
        crds: Create
  interval: 5m
  values:
    controller:
      replicaCount: 2
      service:
        type: LoadBalancer
