---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: production-ingress-nginx
  namespace: flux-system
spec:
  interval: 5m
  path: "./infrastructure/controllers/ingress-nginx"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: bootstrap-ingress-nginx
  namespace: flux-system
spec:
  interval: 1m
  path: "./infrastructure/configs"  # must be a directory
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
---
